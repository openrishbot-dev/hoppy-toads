<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#001a4d;overflow:hidden;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 0%, #1f64ff 0%, #0033a6 65%, #001a4d 100%);}
  #stage{position:relative;}
  canvas{display:block;touch-action:none;box-shadow:0 24px 60px rgba(0,0,0,.55);border-radius:14px;max-width:100%;max-height:100%;}
  /* HTML overlay for name entry + leaderboard (sharper than canvas text) */
  .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    border-radius:14px;background:rgba(0,18,46,.78);backdrop-filter:blur(3px);padding:18px;}
  .overlay.show{display:flex;}
  .card{width:100%;max-width:300px;background:#04173f;border:2px solid #1f64ff;border-radius:16px;
    padding:18px 16px;color:#eef4ff;box-shadow:0 12px 40px rgba(0,0,0,.5);}
  .card h2{font-size:18px;color:#7fb0ff;text-align:center;margin-bottom:4px;letter-spacing:.04em;}
  .card .sub{font-size:11px;color:#9fb6e6;text-align:center;margin-bottom:14px;}
  .lb{list-style:none;font-size:13px;max-height:230px;overflow:auto;margin:4px 0 12px;}
  .lb li{display:flex;justify-content:space-between;gap:8px;padding:6px 8px;border-radius:8px;}
  .lb li:nth-child(odd){background:rgba(31,100,255,.10);}
  .lb li.me{background:rgba(46,194,87,.22);border:1px solid #2ec257;}
  .lb .rk{color:#7fb0ff;width:26px;}
  .lb .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb .sc{color:#ffd84a;font-weight:bold;}
  .row{display:flex;gap:8px;}
  input{flex:1;background:#021231;border:1.5px solid #2f7bff;border-radius:10px;color:#eef4ff;
    padding:10px 12px;font-family:inherit;font-size:14px;outline:none;}
  input:focus{border-color:#7fb0ff;}
  button{background:#0052FF;color:#fff;border:none;border-radius:10px;padding:10px 14px;
    font-family:inherit;font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:.04em;}
  button.ghost{background:transparent;border:1.5px solid #2f7bff;color:#9fb6e6;}
  button:active{transform:translateY(1px);}
  .btns{display:flex;gap:8px;margin-top:12px;}
  .btns button{flex:1;}
  .note{font-size:10px;color:#6f86b8;text-align:center;margin-top:10px;line-height:1.4;}
  .status{font-size:11px;color:#9fb6e6;text-align:center;margin:6px 0;}
  #hint{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:#bcd4ff;font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;opacity:.7;pointer-events:none;}
  /* top-left controls: transport (prev/play-pause/next) + now-playing ticker */
  #controls{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:8px;z-index:5;}
  #transport{display:flex;align-items:center;gap:4px;}
  #transport button{width:34px;height:34px;padding:0;border-radius:10px;background:rgba(0,18,46,.55);
    border:1.5px solid rgba(127,176,255,.45);font-size:15px;line-height:1;display:flex;
    align-items:center;justify-content:center;backdrop-filter:blur(2px);color:#cfe0ff;cursor:pointer;}
  #transport button:active{background:rgba(0,18,46,.8);}
  #playBtn{font-size:16px;}
  #nowPlaying{max-width:150px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    font-size:10px;color:#bcd4ff;background:rgba(0,18,46,.45);padding:6px 9px;border-radius:8px;
    opacity:0;transition:opacity .4s;backdrop-filter:blur(2px);pointer-events:none;}
  #nowPlaying.show{opacity:.85;}
  /* Farcaster identity badge (top-right) — shown only inside a mini-app host */
  #idBadge{position:absolute;top:8px;right:8px;display:none;align-items:center;gap:6px;z-index:5;
    font-size:11px;color:#bcd4ff;background:rgba(0,18,46,.55);padding:5px 9px;border-radius:10px;
    border:1.5px solid rgba(46,194,87,.45);backdrop-filter:blur(2px);max-width:46%;}
  #idBadge img{width:18px;height:18px;border-radius:50%;object-fit:cover;}
  #idBadge span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .verified{font-size:10px;color:#2ec257;}
</style>

<body>
<div id="wrap"><div id="stage">
  <canvas id="game"></canvas>
  <div id="controls">
    <div id="transport">
      <button id="prevBtn" title="Previous track" aria-label="Previous track">⏮</button>
      <button id="playBtn" title="Play/pause" aria-label="Play or pause music">▶</button>
      <button id="nextBtn" title="Next track" aria-label="Next track">⏭</button>
    </div>
    <div id="nowPlaying"></div>
  </div>
  <div id="idBadge"><img id="idPfp" alt="" src=""><span id="idName"></span><span class="verified" id="idVerified"></span></div>
  <!-- Name / game-over overlay -->
  <div id="ovEnd" class="overlay">
    <div class="card">
      <h2 id="endTitle">REKT!</h2>
      <div class="sub" id="endSub">Score 0 · Best 0</div>
      <div id="newHigh" class="status" style="display:none;color:#2ec257;">★ New personal best! ★</div>
      <div class="row" id="nameRow">
        <input id="nameInput" maxlength="14" placeholder="your toad name" autocomplete="off">
        <button id="submitScore">Submit</button>
      </div>
      <div class="status" id="lbStatus">loading leaderboard…</div>
      <ol class="lb" id="lbList"></ol>
      <div class="btns">
        <button id="playAgain">Hop again</button>
        <button class="ghost" id="shareScore">Share</button>
        <button class="ghost" id="viewBoard">Board</button>
      </div>
      <div class="note">Global board — names &amp; scores you submit are visible to all players of this game.</div>
    </div>
  </div>
  <!-- Standalone leaderboard view -->
  <div id="ovBoard" class="overlay">
    <div class="card">
      <h2>🏆 Global Top Toads</h2>
      <div class="sub" id="boardSub">all-time</div>
      <div class="btns" style="margin-top:0;margin-bottom:8px;">
        <button class="ghost" id="tabAll">All-time</button>
        <button class="ghost" id="tabDaily">Daily</button>
      </div>
      <ol class="lb" id="boardList"></ol>
      <div class="status" id="myRank"></div>
      <div class="btns"><button id="closeBoard">Back</button></div>
      <div class="note">Daily challenge resets at midnight UTC.</div>
    </div>
  </div>
</div></div>
<div id="hint">tap · click · space to hop — patience, toby</div>
<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = 400, H = 640;
cv.width = W; cv.height = H;
function fit(){
  const pad = 20, aw = window.innerWidth - pad, ah = window.innerHeight - pad;
  const scale = Math.min(aw / W, ah / H);
  cv.style.width = (W*scale)+'px'; cv.style.height = (H*scale)+'px';
  document.getElementById('stage').style.width = (W*scale)+'px';
  document.getElementById('stage').style.height = (H*scale)+'px';
}
window.addEventListener('resize', fit); fit();

// ---------- AUDIO ----------
let AC=null;
function audio(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function ribbit(){ const a=audio(),t=a.currentTime;
  [[0,260,360],[0.10,300,430]].forEach(([off,f0,f1])=>{ const o=a.createOscillator(),g=a.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(f0,t+off); o.frequency.exponentialRampToValueAtTime(f1,t+off+0.07);
    g.gain.setValueAtTime(0.0001,t+off); g.gain.exponentialRampToValueAtTime(0.25,t+off+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.13);
    o.connect(g).connect(a.destination); o.start(t+off); o.stop(t+off+0.15); }); }
function croak(){ const a=audio(),t=a.currentTime; const o=a.createOscillator(),g=a.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+0.45);
  const lfo=a.createOscillator(),lg=a.createGain(); lfo.frequency.value=18; lg.gain.value=30;
  lfo.connect(lg).connect(o.frequency); lfo.start(t); lfo.stop(t+0.5);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.35,t+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
  o.connect(g).connect(a.destination); o.start(t); o.stop(t+0.5); }
function chime(base){ const a=audio(),t=a.currentTime;
  [0,0.08,0.16].forEach((off,i)=>{ const o=a.createOscillator(),g=a.createGain();
    o.type='sine'; o.frequency.value=base*(1+i*0.26);
    g.gain.setValueAtTime(0.0001,t+off); g.gain.exponentialRampToValueAtTime(0.2,t+off+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.2);
    o.connect(g).connect(a.destination); o.start(t+off); o.stop(t+off+0.22); }); }
function fanfare(){ const a=audio(),t=a.currentTime; [523,659,784,1047].forEach((f,i)=>{
    const o=a.createOscillator(),g=a.createGain(); o.type='triangle'; o.frequency.value=f;
    const off=i*0.09; g.gain.setValueAtTime(0.0001,t+off); g.gain.exponentialRampToValueAtTime(0.22,t+off+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.25);
    o.connect(g).connect(a.destination); o.start(t+off); o.stop(t+off+0.28); }); }

// ---------- CONSTANTS ----------
const GRAV=0.45, FLAP=-7.4, MAXFALL=11;
const PIPE_W=64, GROUND_H=70;
const BASE_SPEED=2.4, MAX_SPEED=4.4;       // difficulty ramp ceiling
const BASE_GAP=178, MIN_GAP=140;
const MAX_SHIELDS=3;
const COMBO_WINDOW=240;                      // frames to keep a relic chain alive

// ---------- DAILY SEED ----------
function utcDayKey(){ const d=new Date(); return d.getUTCFullYear()+'-'+(d.getUTCMonth()+1)+'-'+d.getUTCDate(); }
function seedFromString(str){ let h=2166136261; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let rng = Math.random;            // free play uses true random
let dailyMode = false;

// ---------- STATE ----------
let toad, pipes, items, flakes, pops, score, frame=0, state='ready';
let speed=BASE_SPEED, gap=BASE_GAP;
let mult=1, taboshiTimers=[], shields=0, flash=0, banner="", bannerT=0;
let combo=0, comboT=0, comboBestRun=0;
let relicsThisRun={taboshi:0,patience:0,sato:0};
let runAch=new Set();
// --- juice (visual only; uses Math.random so it never perturbs the daily seed) ---
let shake=0, sparks=[], lastMilestone=0;
function addShake(n){ shake=Math.max(shake,n); }
function spawnSparks(x,y,color,n){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=1+Math.random()*3.5;
  sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:24+Math.random()*16,color}); } }
const lore=["patience","still water","wgmi","toby smiles","slow is fast","based"];
let loreTxt="";

// persistent profile
let profile = { name:"", best:0, dailyBest:{}, streak:0, lastDay:"", totalRuns:0, achievements:[] };
// streak reward: 3+ days -> 1 free shield, 7+ -> 2, 14+ -> 3
function streakShields(){ const st=profile.streak||0; if(st>=14) return 3; if(st>=7) return 2; if(st>=3) return 1; return 0; }

function reset(){
  rng = dailyMode ? mulberry32(seedFromString('toby-'+utcDayKey())) : Math.random;
  toad={x:110,y:H/2,vy:0,r:19,rot:0,sq:0};
  pipes=[]; items=[]; flakes=[]; pops=[]; sparks=[]; shake=0; lastMilestone=0;
  score=0; frame=0; state='ready';
  speed=BASE_SPEED; gap=BASE_GAP;
  mult=1; taboshiTimers=[]; shields=0; flash=0; banner=""; bannerT=0;
  // streak reward: bank free shields at the start of the run
  const freeSh=streakShields();
  if(freeSh>0){ shields=freeSh; bannerT=140; banner='🔥 streak gift — '+freeSh+' free shield'+(freeSh>1?'s':''); }
  combo=0; comboT=0; comboBestRun=0;
  relicsThisRun={taboshi:0,patience:0,sato:0}; runAch=new Set();
  let x=W+180; for(let i=0;i<3;i++){ addPipe(x); x+=240; }
}
let nextPipeX=0;
function addPipe(x){
  const margin=70;
  const top=margin + rng()*(H-GROUND_H-gap-margin*2);
  pipes.push({x,top,gap,passed:false,sway:rng()*Math.PI*2});
  if(rng()<0.55){
    const r=rng();
    const ty = r<0.10 ? 'patience' : (r<0.55 ? 'taboshi' : 'sato');
    items.push({x:x+PIPE_W+120, y:top+gap/2+(rng()*40-20), type:ty, got:false, bob:rng()*7, spin:0});
  }
}

function flap(){
  if(state==='ready'){ state='play'; startRun(); }   // request an anti-cheat run token
  if(state==='play'){ toad.vy=FLAP; toad.sq=1; ribbit(); }
  // (dead state handled by overlay buttons now)
}
function onPress(e){
  if(state==='dead') return;            // overlay buttons take over
  audio(); try{ Music.start(); }catch(_){}; flap();
}
['mousedown','touchstart','keydown'].forEach(ev=>{
  cv.addEventListener(ev, e=>{
    if(ev==='keydown' && e.code!=='Space') return;
    if(ev==='touchstart') e.preventDefault();
    onPress(e);
  }, {passive:false});
});
// space works globally too
window.addEventListener('keydown',e=>{ if(e.code==='Space' && state!=='dead'){ audio(); flap(); }});

// ---------- DRAW: pillars, toby, relics (unchanged visuals) ----------
// Base brand mark: a solid disc with a horizontal slot notched into its left
// side (reads as a "backwards C"). Builds the path; caller sets fillStyle + fill().
function baseLogo(cx,cy,r){
  const h=0.082*r, inX=cx+0.324*r, a=Math.PI-Math.atan2(0.082,1);
  ctx.beginPath();
  ctx.moveTo(inX,cy-h);
  ctx.arc(cx,cy,r,-a,a,false);   // long way around the right, leaving the left gap
  ctx.lineTo(inX,cy+h);
  ctx.closePath();
}
function pillar(x,y,w,h,isTop){
  ctx.save(); ctx.translate(x,y);
  const g=ctx.createLinearGradient(0,0,w,0);
  g.addColorStop(0,'#0040cc'); g.addColorStop(.45,'#1f64ff'); g.addColorStop(1,'#0033a6');
  ctx.fillStyle=g; ctx.strokeStyle='#001a4d'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(0,0,w,h,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.roundRect(7,6,9,h-12,5); ctx.fill();
  const capY=isTop?h-20:0; ctx.fillStyle='#1f64ff'; ctx.strokeStyle='#001a4d';
  ctx.beginPath(); ctx.roundRect(-8,capY,w+16,22,9); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.92)'; baseLogo(w/2,capY+11,7); ctx.fill();
  ctx.restore();
}
function drawToad(){
  const {x,y,r,rot}=toad;
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.scale(r/19,r/19);
  const sq=toad.sq||0; ctx.scale(1-0.16*sq, 1+0.16*sq); // hop squash-and-stretch
  ctx.lineJoin='round'; const OUT='#06122e';
  for(let si=0; si<shields; si++){ ctx.strokeStyle='rgba(224,85,46,'+(0.9-si*0.18)+')'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,2,32+si*4,0,Math.PI*2); ctx.stroke(); }
  if(mult>1){ ctx.strokeStyle='rgba(46,194,87,.85)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(0,2,36,frame*0.05,frame*0.05+Math.PI*1.6); ctx.stroke(); ctx.setLineDash([]); }
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(2,22,22,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2f7bff'; ctx.strokeStyle=OUT; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-20,-14); ctx.lineTo(-12,-30); ctx.lineTo(-3,-16); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-14); ctx.lineTo(12,-30); ctx.lineTo(3,-16); ctx.closePath(); ctx.fill(); ctx.stroke();
  const bg=ctx.createLinearGradient(-24,-20,24,24);
  bg.addColorStop(0,'#7fb0ff'); bg.addColorStop(.5,'#2f7bff'); bg.addColorStop(1,'#0a52e6');
  ctx.fillStyle=bg; ctx.strokeStyle=OUT; ctx.lineWidth=4;
  ctx.beginPath(); ctx.ellipse(0,2,25,22,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#2f7bff';
  for(const fx of [-13,-2,13]){ ctx.beginPath(); ctx.ellipse(fx,22,5.5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
  ctx.fillStyle='#eef4ff'; ctx.beginPath(); ctx.ellipse(2,8,17,15,0,0,Math.PI*2); ctx.fill();
  for(const ex of [-10,11]){
    ctx.fillStyle='#06122e'; ctx.beginPath(); ctx.ellipse(ex,-6,8.5,9.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ex+2.5,-9,3.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex-2,-2,1.6,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle='#06122e'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,6); ctx.quadraticCurveTo(-2,11,2,6); ctx.quadraticCurveTo(6,11,9,6); ctx.stroke();
  ctx.restore();
}
function drawTaboshi(cx,cy,sp){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(Math.sin(sp*0.04)*0.15);
  const g=ctx.createLinearGradient(-13,-16,13,16); g.addColorStop(0,'#5fd07a'); g.addColorStop(1,'#1f9e3f');
  ctx.fillStyle=g; ctx.strokeStyle='#0c6b25'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,-17); ctx.bezierCurveTo(14,-12,15,8,0,17); ctx.bezierCurveTo(-15,8,-14,-12,0,-17); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='rgba(11,107,37,.7)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(0,15); ctx.stroke();
  ctx.strokeStyle='rgba(180,255,190,.45)'; ctx.lineWidth=1;
  ctx.beginPath(); for(let i=0;i<6;i++){const a=i/6*Math.PI*2; const px=Math.cos(a)*6,py=Math.sin(a)*6; i?ctx.lineTo(px-4,py):ctx.moveTo(px-4,py);} ctx.closePath(); ctx.stroke();
  ctx.fillStyle='#0c6b25'; ctx.beginPath(); ctx.ellipse(-4,2,3,2.4,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#0c6b25'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(4,3); ctx.lineTo(9,3); ctx.stroke(); ctx.restore(); }
function drawPatience(cx,cy,sp){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(sp*0.02);
  const g=ctx.createLinearGradient(0,-16,0,16); g.addColorStop(0,'#e0552e'); g.addColorStop(1,'#9c1f10');
  ctx.fillStyle=g; ctx.strokeStyle='#5e1106'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(15,12); ctx.lineTo(-15,12); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#001a4d'; ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(8,11); ctx.lineTo(-8,11); ctx.closePath(); ctx.fill(); ctx.restore(); }
function drawSato(cx,cy,sp){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(sp*0.06);
  const g=ctx.createRadialGradient(0,0,2,0,0,16); g.addColorStop(0,'#eaf3ff'); g.addColorStop(.5,'#2f7bff'); g.addColorStop(1,'#0a2a7a');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#eaf3ff'; ctx.lineWidth=2.4; ctx.lineCap='round';
  ctx.beginPath(); for(let a=0;a<Math.PI*3.4;a+=0.2){const rr=2+a*1.7; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);} ctx.stroke();

function checkAchievements(){

      runAch.add(a.id); profile.achievements.push(a.id);

    }
  }
}

// ---------- COMBO ----------
function addCombo(){ combo++; comboT=COMBO_WINDOW; if(combo>comboBestRun) comboBestRun=combo; }

// ---------- UPDATE ----------
function update(){
  frame++;
  if(taboshiTimers.length){
    for(let i=0;i<taboshiTimers.length;i++) taboshiTimers[i]--;
    taboshiTimers=taboshiTimers.filter(t=>t>0);
    mult=1+taboshiTimers.length; // each active $TABOSHI stacks +1x; they decay individually
  }
  if(flash>0) flash--; if(bannerT>0) bannerT--;
  if(comboT>0){ comboT--; if(comboT===0) combo=0; }
  for(const p of pops){ p.y-=0.6; p.life--; }
  pops=pops.filter(p=>p.life>0);
  if(shake>0) shake-=1;
  if(toad && toad.sq>0) toad.sq=Math.max(0, toad.sq-0.12);
  for(const s of sparks){ s.vy+=0.12; s.x+=s.vx; s.y+=s.vy; s.life--; }
  sparks=sparks.filter(s=>s.life>0);

  if(state==='play'){
    // difficulty ramp by score
    speed=Math.min(MAX_SPEED, BASE_SPEED + score*0.02);
    gap=Math.max(MIN_GAP, BASE_GAP - score*0.4);

    toad.vy=Math.min(toad.vy+GRAV,MAXFALL); toad.y+=toad.vy;
    toad.rot=Math.max(-0.5,Math.min(1.4,toad.vy*0.07));
    for(const p of pipes){
      p.x-=speed;
      if(!p.passed && p.x+PIPE_W<toad.x){ p.passed=true; const g=mult; score+=g;
        if(score%5<g) loreTxt=lore[Math.floor(rng()*lore.length)];
        if(score>profile.best) profile.best=score;
        if(score>=lastMilestone+25){ lastMilestone=Math.floor(score/25)*25;
          banner='🔥 '+lastMilestone+' — keep hopping!'; bannerT=90; addShake(5); chime(784); } }
    }
    if(pipes.length && pipes[0].x<-PIPE_W){ pipes.shift();
      addPipe(pipes[pipes.length-1].x + 230); }
    for(const it of items){
      it.x-=speed;
      if(!it.got){ const dy=toad.y-it.y, dx=toad.x-it.x;
        if(dx*dx+dy*dy<(toad.r+16)*(toad.r+16)){ it.got=true; addCombo();
          relicsThisRun[it.type]++;
          spawnSparks(it.x,it.y, it.type==='taboshi'?'#5fd07a':it.type==='patience'?'#e0552e':'#7fb0ff', 14);
          addShake(4);
          const cb=combo>=2?combo:0;
          if(it.type==='taboshi'){ taboshiTimers.push(420); mult=1+taboshiTimers.length; chime(523); banner="$TABOSHI — yield x"+mult; bannerT=110; }
          else if(it.type==='patience'){
            if(shields<MAX_SHIELDS){ shields++; banner="$PATIENCE — shield banked ("+shields+"/"+MAX_SHIELDS+")"; }
            else { score+=5; banner="$PATIENCE — banks full, +5"; }
            chime(392); bannerT=110; }
          else { spawnFlakes(it.x,it.y,16); chime(659); banner="SATO — gold flakes!"; bannerT=110; }
          if(cb){ const bonus=cb*2; score+=bonus; popText(it.x,it.y-20,'COMBO x'+cb+' +'+bonus,'#ffd84a'); }
          checkAchievements();
        }
      }
    }
    items=items.filter(it=>it.x>-40 && !it.got);
    for(const f of flakes){ f.vy+=0.18; f.x+=f.vx-speed*0.3; f.y+=f.vy; f.life--;
      if(f.life>40){ const dx=toad.x-f.x, dy=toad.y-f.y;
        if(dx*dx+dy*dy<(toad.r+8)*(toad.r+8)){ f.collect=true; score+=2; } } }
    flakes=flakes.filter(f=>f.life>0 && !f.collect);

    const r=toad.r-4;
    for(const p of pipes){
      if(toad.x+r>p.x && toad.x-r<p.x+PIPE_W){
        if(toad.y-r<p.top || toad.y+r>p.top+p.gap){
          if(shields>0){ shields--; flash=12; toad.vy=FLAP*0.7; p.passed=true; chime(300);
            banner="patience held — survived! ("+shields+" left)"; bannerT=90; toad.x=p.x-r-2;
            addShake(9); spawnSparks(toad.x,toad.y,'#e0552e',18); }
          else die(); }
      }
    }
    if(toad.y+toad.r>H-GROUND_H){ toad.y=H-GROUND_H-toad.r; die(); }
    if(toad.y-toad.r<0){ toad.y=toad.r; toad.vy=0; }
    checkAchievements();
  } else if(state==='ready'){ toad.y=H/2+Math.sin(frame*0.08)*8; toad.rot=0; }
}
function die(){ if(state!=='play') return; state='dead'; croak();
  addShake(16); spawnSparks(toad.x,toad.y,'#7fb0ff',22);
  if(score>profile.best) profile.best=score;
  profile.totalRuns++;
  // streak: count consecutive UTC days played
  const today=utcDayKey();
  if(profile.lastDay!==today){
    const y=new Date(); y.setUTCDate(y.getUTCDate()-1);
    const yk=y.getUTCFullYear()+'-'+(y.getUTCMonth()+1)+'-'+y.getUTCDate();
    profile.streak = (profile.lastDay===yk)? profile.streak+1 : 1;
    profile.lastDay=today;
  }
  if(dailyMode){ profile.dailyBest[today]=Math.max(profile.dailyBest[today]||0, score); }
  saveProfile();
  showGameOver();
}

// ---------- RENDER ----------
function render(){
  ctx.save();
  if(shake>0){ const m=shake*0.45; ctx.translate((Math.random()-.5)*m,(Math.random()-.5)*m); }
  drawBackground();
  for(const it of items) drawItem(it);
  for(const p of pipes){ const sway=Math.sin(frame*0.02+p.sway)*1.5;
    pillar(p.x+sway,0,PIPE_W,p.top,true);
    pillar(p.x-sway,p.top+p.gap,PIPE_W,H-GROUND_H-(p.top+p.gap),false); }
  for(const f of flakes){ ctx.globalAlpha=Math.min(1,f.life/30);
    ctx.fillStyle=f.life%6<3?'#ffd84a':'#ffb300'; ctx.beginPath(); ctx.arc(f.x,f.y,2.6,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
  drawGround(); drawToad();
  for(const s of sparks){ ctx.globalAlpha=Math.min(1,s.life/24); ctx.fillStyle=s.color;
    ctx.beginPath(); ctx.arc(s.x,s.y,2.4,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha=1;
  if(flash>0){ ctx.fillStyle='rgba(224,85,46,'+(flash/24)+')'; ctx.fillRect(0,0,W,H); }
  for(const p of pops){ ctx.globalAlpha=Math.min(1,p.life/20); ctx.fillStyle=p.color;
    ctx.font='bold 13px ui-monospace,monospace'; ctx.textAlign='center'; ctx.fillText(p.txt,p.x,p.y); ctx.globalAlpha=1; }
  drawHUD(); baseWatermark();
  if(bannerT>0){ ctx.globalAlpha=Math.min(1,bannerT/30);
    ctx.fillStyle='rgba(0,26,77,.85)'; ctx.beginPath(); ctx.roundRect(W/2-130,116,260,30,8); ctx.fill();
    ctx.fillStyle='#eef4ff'; ctx.font='bold 13px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText(banner,W/2,136); ctx.globalAlpha=1; }
  if(state==='ready') readyPanel();
  ctx.restore();
}
function loop(){ update(); render(); requestAnimationFrame(loop); }

// =================== PERSISTENCE ===================
// Profile (personal best, streak, achievements, name) is per-device -> localStorage.
const PROFILE_KEY='hoppytoads.profile';
async function loadProfile(){
  try{ const raw=localStorage.getItem(PROFILE_KEY);
    if(raw) profile=Object.assign(profile, JSON.parse(raw));
  }catch(e){}
  if(profile.name){ nameInput.value=profile.name; }
}
async function saveProfile(){
  try{ localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); }catch(e){}
}

// Global leaderboard -> serverless API (/api/scores) backed by Upstash Redis.
// Must degrade gracefully: any failure returns an empty board and the game keeps playing.
async function fetchLeaderboard(mode){ // mode: 'all' | 'daily'
  try{
    const res=await fetch('/api/scores?mode='+(mode==='daily'?'daily':'all'),{cache:'no-store'});
    if(!res.ok) throw new Error('bad status '+res.status);
    const data=await res.json();
    const rows=Array.isArray(data.rows)?data.rows:[];
    return rows.slice(0,20);
  }catch(e){ return null; } // null signals "couldn't load" to the renderer
}
async function submitToLeaderboard(name, sc, mode){
  // identity = connected wallet / Farcaster fid when inside a mini-app host (else undefined).
  // token = the signed run token from startRun() for server-side anti-cheat (else undefined).
  try{
    const res=await fetch('/api/scores',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name, score:sc, mode:mode==='daily'?'daily':'all',
        identity:Identity.identity||undefined, token:runToken||undefined})
    });
    return res.ok;
  }catch(e){ return false; }
}

    el.appendChild(li);
  });
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// =================== ANTI-CHEAT RUN TOKEN ===================
// At the start of each run we ask the server for a short-lived signed token. On submit we send it
// back so the server can verify the run is real (valid HMAC, single-use nonce, plausible duration).
// Fully graceful: if this fetch fails, runToken stays null and the score just may not be recorded —
// gameplay is never affected.
let runToken=null;
async function startRun(){
  runToken=null;
  try{
    const r=await fetch('/api/scores?start=1',{cache:'no-store'});
    if(r.ok){ const d=await r.json(); runToken=d.token||null; }
  }catch(e){ /* offline / not configured -> submit will be tokenless */ }
}

// =================== FARCASTER / BASE IDENTITY ===================
// When running inside a Farcaster / Base mini-app host, use the verified account as identity:
// prefill + lock the leaderboard name to the username and attach the wallet address (or fid) as
// `identity`. Outside a host this all no-ops and the typed-name flow is used.
const Identity = { name:null, identity:null, verified:false };
function applyIdentity(user){
  const clean=(Identity.name||'').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,14);
  if(clean){ profile.name=clean; saveProfile();
    if(nameInput){ nameInput.value=clean; nameInput.readOnly=true; nameInput.title='Signed in as @'+Identity.name; } }
  const badge=document.getElementById('idBadge');
  if(badge){
    document.getElementById('idName').textContent='@'+(Identity.name||'');
    document.getElementById('idVerified').textContent='✓';
    const pfp=document.getElementById('idPfp');
    if(user && user.pfpUrl){ pfp.src=user.pfpUrl; pfp.style.display='block'; } else { pfp.style.display='none'; }
    badge.style.display='flex';
  }
}
async function initMiniApp(){
  try{
    const mod=await import('https://esm.sh/@farcaster/miniapp-sdk');
    const sdk=mod.sdk||(mod.default&&mod.default.sdk)||mod.default;
    if(!sdk||!sdk.actions) return;
    try{ await sdk.actions.ready(); }catch(e){}   // dismiss the host splash screen
    let ctx=null;
    try{ ctx=await Promise.race([sdk.context, new Promise(r=>setTimeout(()=>r(null),3000))]); }catch(e){}
    const user=ctx&&ctx.user;
    if(!user) return;                              // launched outside a real host
    Identity.name=user.username||('fid'+user.fid);
    Identity.identity='fc:'+user.fid;
    Identity.verified=true;
    try{
      const provider=sdk.wallet&&sdk.wallet.getEthereumProvider&&await sdk.wallet.getEthereumProvider();
      if(provider){ const accts=await provider.request({method:'eth_accounts'});
        if(accts&&accts[0]) Identity.identity=String(accts[0]).toLowerCase(); }
    }catch(e){ /* keep fid identity */ }
    applyIdentity(user);
  }catch(e){ /* SDK unavailable / plain web -> typed-name flow */ }
}

// =================== BACKGROUND MUSIC (toadvault.xyz catalog) ===================
// Streams the Tobyworld tracks hosted via toadvault.xyz. Tries the live catalog first
// (CORS-enabled) and falls back to the bundled /music.json. Plays through an <audio> element so it
// mixes with the synthesized SFX; volume kept low so hops/croaks stay audible. Starts on the first
// user gesture (autoplay policy), is shuffled, loops the playlist, and the toggle is remembered.
const Music=(function(){
  const el=new Audio(); el.volume=0.30; el.preload='auto';
  const playBtn=document.getElementById('playBtn'),
        prevBtn=document.getElementById('prevBtn'),
        nextBtn=document.getElementById('nextBtn'),
        np=document.getElementById('nowPlaying');
  let tracks=[], order=[], idx=0, started=false, loading=null, playing=false;
  // remembered preference: did the user leave the music on or off last time?
  let enabled=(localStorage.getItem('hoppytoads.music')||'on')!=='off';
  function setIcon(){ if(playBtn) playBtn.textContent=playing?'⏸':'▶'; }
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function load(){
    if(loading) return loading;
    loading=(async()=>{
      let list=null;
      try{ const r=await fetch('https://toadvault.xyz/data/music.json',{cache:'no-store'});
        if(r.ok){ const d=await r.json(); if(Array.isArray(d)) list=d.map(t=>({title:t.title,url:t.audioUrl})); } }catch(e){}
      if(!list||!list.length){ try{ const r=await fetch('/music.json'); const d=await r.json(); list=d.tracks||[]; }catch(e){} }
      tracks=(list||[]).filter(t=>t&&t.url);
      order=shuffle(tracks.map((_,i)=>i)); idx=0;
    })();
    return loading;
  }
  function showNP(title){ np.textContent='♪ '+title; np.classList.add('show');
    clearTimeout(showNP._t); showNP._t=setTimeout(()=>np.classList.remove('show'),4500); }
  function pick(n){ return ((n%order.length)+order.length)%order.length; } // wrap, never negative
  function playCurrent(){
    if(!tracks.length) return;
    idx=pick(idx);
    const t=tracks[order[idx]];
    el.src=t.url; el.play().then(()=>{ playing=true; setIcon(); showNP(t.title); }).catch(()=>{});
  }
  el.addEventListener('ended',()=>{ idx++; playCurrent(); });
  let errs=0;
  el.addEventListener('error',()=>{ errs++; if(errs<tracks.length){ idx++; setTimeout(playCurrent,300); } });
  // first user gesture: auto-start unless the user had turned music off last session
  async function start(){ if(started||!enabled) return; started=true; await load(); playCurrent(); }
  async function togglePlay(){
    if(playing){ el.pause(); playing=false; enabled=false; np.classList.remove('show'); }
    else { enabled=true; if(!tracks.length){ await load(); } started=true;
      if(el.src){ el.play().then(()=>{ playing=true; setIcon(); }).catch(()=>{}); } else { playCurrent(); } }
    localStorage.setItem('hoppytoads.music',enabled?'on':'off'); setIcon();
  }
  async function step(d){ enabled=true; localStorage.setItem('hoppytoads.music','on'); started=true;
    if(!tracks.length){ await load(); } idx+=d; playCurrent(); }
  if(playBtn) playBtn.addEventListener('click',e=>{ e.stopPropagation(); togglePlay(); });
  if(prevBtn) prevBtn.addEventListener('click',e=>{ e.stopPropagation(); step(-1); });
  if(nextBtn) nextBtn.addEventListener('click',e=>{ e.stopPropagation(); step(1); });
  setIcon(); load();   // warm the catalog so the first hop starts music instantly
  return { start, toggle:togglePlay };
})();

// boot
initMiniApp();
loadProfile().then(()=>{ reset(); loop(); });
</script>
